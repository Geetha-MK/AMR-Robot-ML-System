<html>
	<head>
	<!-- Bootstrap CSS -->
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">
		<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
		<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
		<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
		<title>Health Monitoring System</title>
	</head>
	<body style="background-image:url('static\\bg.jpg');background-repeat: no-repeat;background-size: cover;"></body>

	<body>
		<br> <br> <br> <br><br>
	<!-- Java Script -->	
		<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
		<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
		<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
		
		
		<nav class="navbar navbar-expand-sm navbar-dark fixed-top bg-dark" style="background-color: black !important;">
			<a style="text-decoration: none; color: white" href="{{ url_for('home') }}">Health Monitoring System</a>
			<button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
			   <span class="navbar-toggler-icon"></span>
			 </button>
			 <div class="collapse navbar-collapse" id="navbarNav">
			   <ul class="navbar-nav ml-auto">
				  <li class="nav-item active">
					<a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
				  </li>
			   </ul>
			 </div>
		   </nav>
		{% block content%}
		<div class="container">
			<br>
			<br>

			<!--Prediction Result-->
			<center>
			<div id ="result">
				<h3><strong style="color:red">{{result}}</strong></h3>
				
			</div>
		</center>
			
			
			
			<form action = "{{url_for('predictPage')}}" method ="POST" >
				<fieldset>
					
				  <div class="card card-body" >
					<center><h3>Health Monitoring</h3></center>
					<hr>
					<div class="form-group  row">
						<div class="col-sm-4">
							<label for="name">Name</label>
							<input type="text" class="form-control" id="name" name="name" required>
						</div>
						<div class="col-sm-4">
							<label for="age">Age</label>
							<input type="number" class="form-control" id="age" name="age" min="20" max="100" required>
						</div>
						<div class="col-sm-4">
							<label for="sex">Gender</label>
							<select class="form-control" id="sex"  name="sex" required>
							  <option disabled selected value> -- Select an Option -- </option>
							  <option value = "0">Male</option>
							  <option value = "1">Female</option>
							</select>
							</div>
					   
					</div>
					<div class="form-group  row">
						<div class="col-sm-4">
						<label for="bp">Blood Pressure</label>
						<input type="number" class="form-control" value= "{{bp}}" id="bp" name="bp" required  >
						</div>
						<div class="col-sm-4">
							<label for="oxy">Oxygen</label>
							<input type="number" class="form-control" value="{{oxy}}" id="oxy" name="oxy" required>
						  </div>
						  <div class="col-sm-4">
							<label for="heart">Heart Beat</label>
							<input type="number" class="form-control" value="{{hb}}" id="heart" name="heart" required>
						</div>
						  
					</div>
							<div class="form-group  row">
						<div class="col-sm-6">
							<label for="ecg" >ECG </label>
							<input type="number" class="form-control" id="ecg" value="{{ecg}}" name="ecg"  required>
						</div>
							<div class="col-sm-6">

							<label for="Temperature">Temperature</label>
							<input type="text" class="form-control" id="Temperature" value="{{temp}}" name="Temperature"  required>
							</div>
							
							
						</div>
						
					  <div class="form-group">
						<input class="btn btn-primary" type="submit" value="Result">
					  </div>
					  
					  
					</div>
			 </fieldset>

			 
			</form>

			<form action="{{url_for('msg')}}" method="POST">    
				<fieldset>
					<div class="card card-body" >   
						<div class="form-group"> 
				<input type="file" id="file" name="filename" required>
				</div>
				<div class="form-group">
					<input class="btn btn-primary" type="submit" value="Send">
				  </div>
				</div>
				</fieldset>
			  </form> 
			
		<!-- </div> -->
		
		{% endblock content %}
	<!-- </div> -->
	</body>
</html>
